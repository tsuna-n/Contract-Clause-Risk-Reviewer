server {
    listen       80;
    server_name  _;
    root         /usr/share/nginx/html;
    index        index.html;

    gzip             on;
    gzip_types       text/css application/javascript application/json image/svg+xml;
    gzip_min_length  1024;

    # Vite fingerprints these, so they can never go stale.
    location /assets/ {
        expires    1y;
        add_header Cache-Control "public, immutable";
    }

    # react-router uses history routing: /contract and /auth/callback are not
    # files on disk, so every unmatched path has to fall through to index.html
    # or a refresh on those routes 404s.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
